<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Shortener</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f5; color: #18181b; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
    .card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    input { flex: 1; min-width: 200px; padding: 0.6rem 0.9rem; border: 1px solid #d4d4d8; border-radius: 8px; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #6366f1; }
    button { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 600; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; background: #e4e4e7; color: #3f3f46; border-radius: 6px; border: none; cursor: pointer; margin-left: 0.25rem; }
    .btn-sm:hover { background: #d4d4d8; }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-success { background: #dcfce7; color: #16a34a; }
    .btn-success:hover { background: #bbf7d0; }
    #message { margin-top: 0.75rem; font-size: 0.9rem; color: #16a34a; min-height: 1.2rem; }
    #message.error { color: #dc2626; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 2px solid #e4e4e7; color: #71717a; font-weight: 600; }
    td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #f4f4f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .slug-link { color: #6366f1; text-decoration: none; font-weight: 600; }
    .slug-link:hover { text-decoration: underline; }
    .dest-cell { display: flex; align-items: center; gap: 0.5rem; max-width: 280px; }
    .dest-cell img { width: 16px; height: 16px; flex-shrink: 0; border-radius: 3px; }
    .dest { color: #71717a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge { display: inline-block; background: #ede9fe; color: #6d28d9; border-radius: 999px; padding: 0.15rem 0.6rem; font-size: 0.8rem; font-weight: 600; }
    .edit-row { display: none; background: #f9f9fb; }
    .edit-row.open { display: table-row; }
    .edit-row td { padding: 0.5rem 0.75rem; }
    .edit-inner { display: flex; gap: 0.5rem; align-items: center; }
    .edit-inner input { padding: 0.4rem 0.75rem; font-size: 0.88rem; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 1.5rem; width: 95%; max-width: 820px; max-height: 88vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #71717a; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
    .stat-box { background: #f4f4f5; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; }
    .stat-box .num { font-size: 1.4rem; font-weight: 700; color: #6366f1; }
    .stat-box .label { font-size: 0.72rem; color: #71717a; margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .section-title { font-size: 0.95rem; font-weight: 600; margin: 1.25rem 0 0.6rem; color: #3f3f46; }
    .chart-wrap { background: #f9f9fb; border-radius: 10px; padding: 1rem; margin-bottom: 0.5rem; }
    .top-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
    .top-tag { background: #ede9fe; color: #6d28d9; border-radius: 999px; padding: 0.2rem 0.65rem; font-size: 0.78rem; font-weight: 600; }
    .click-table { font-size: 0.78rem; }
    .click-table th { font-size: 0.75rem; }
    .click-table td { padding: 0.45rem 0.6rem; }
    #no-links { color: #71717a; font-size: 0.9rem; padding: 1rem 0; }
    .confirm-bar { display: none; align-items: center; gap: 0.75rem; background: #fee2e2; border-radius: 8px; padding: 0.6rem 1rem; margin-top: 0.75rem; font-size: 0.9rem; }
    .confirm-bar.show { display: flex; }
  </style>
</head>
<body>

<h1>🔗 Link Shortener</h1>

<div class="card">
  <h2>Create a Short Link</h2>
  <div class="row">
    <input id="destination" type="url" placeholder="https://example.com/long-url" />
    <input id="customSlug" type="text" placeholder="Custom slug (optional)" style="max-width:200px" />
    <button class="btn-primary" onclick="createLink()">Shorten</button>
  </div>
  <div id="message"></div>
</div>

<div class="card">
  <h2>Your Links</h2>
  <div id="links-container"><p id="no-links">Loading...</p></div>
  <div class="confirm-bar" id="confirm-bar">
    <span id="confirm-text"></span>
    <button class="btn-sm btn-danger" onclick="confirmDelete()">Yes, delete</button>
    <button class="btn-sm" onclick="cancelDelete()">Cancel</button>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Stats</h2>
    <p id="modal-dest" style="color:#71717a;font-size:0.82rem;margin-bottom:1rem;word-break:break-all;"></p>
    <div class="stat-grid" id="stat-grid"></div>
    <p class="section-title">Clicks Over Time</p>
    <div class="chart-wrap">
      <canvas id="clicks-chart" height="100"></canvas>
    </div>
    <div id="top-sections"></div>
    <p class="section-title">Click Log</p>
    <div id="click-log"></div>
  </div>
</div>
